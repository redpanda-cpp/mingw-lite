name: Build single

on:
  workflow_call:
    inputs:
      buildenv:
        required: false
        type: string
        default: ''
      runner:
        required: true
        type: string
      profile:
        required: true
        type: string
      branch:
        required: true
        type: string
      test_cross:
        required: false
        type: boolean
        default: true
      upload_prefix:
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Download source
        uses: actions/download-artifact@v8
        with:
          name: src-${{ inputs.branch }}
          path: assets

      - uses: actions/download-artifact@v8
        with:
          name: buildenv-${{ inputs.buildenv }}
          path: assets

      - name: Build
        run: |
          zstdcat assets/buildenv.tar.zst | podman load
          podman run --rm --cap-add=sys_admin -v $PWD:/mnt -w /mnt mingw-lite/buildenv \
            ./main.py --branch ${{ inputs.branch }} --profile ${{ inputs.profile }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.upload_prefix }}mingw${{ inputs.profile }}-${{ inputs.branch }}
          path: dist

  test_on_linux:
    name: Test on Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Enable multiarch
        run: |
          sudo dpkg --add-architecture i386

      - uses: ConorMacBride/install-package@v1
        with:
          apt: libarchive-tools wine

      # apt install wine-binfmt seems not work
      - name: Register wine binfmt
        run: |
          echo ':DOSWin:M::MZ::/usr/bin/wine:' | sudo tee /proc/sys/fs/binfmt_misc/register

      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.upload_prefix }}mingw${{ inputs.profile }}-${{ inputs.branch }}
          path: dist

      - name: Test
        run: |
          ./test.py --branch ${{ inputs.branch }} --profile ${{ inputs.profile }} --verbose

  test_on_windows:
    name: Test on Windows
    needs: build
    strategy:
      fail-fast: false
      matrix:
        runner:
          - windows-2025
          - windows-2022
          - windows-11-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.upload_prefix }}mingw${{ inputs.profile }}-${{ inputs.branch }}
          path: dist

      - uses: ./.github/setup-bsdtar

      - name: Install Python Package
        run: |
          pip install packaging

      - name: Test
        run: |
          python test.py --branch ${{ inputs.branch }} --profile ${{ inputs.profile }} --verbose

  test_cross:
    name: Test cross
    if: ${{ inputs.test_cross }}
    runs-on: ubuntu-26.04
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Enable multiarch
        run: |
          sudo dpkg --add-architecture i386

      - uses: ConorMacBride/install-package@v1
        with:
          apt: libarchive-tools musl wine

      - name: Register wine binfmt
        run: |
          echo ':DOSWin:M::MZ::/usr/bin/wine:' | sudo tee /proc/sys/fs/binfmt_misc/register

      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.upload_prefix }}mingw${{ inputs.profile }}-${{ inputs.branch }}
          path: dist

      # avoid wine failures (possibly race condition)
      #   wine: created the configuration directory '/root/.wine'
      #   wine: chdir to /tmp/wine-wr755y/server-801-6f0401 : No such file or directory
      - name: Initialize wine prefix
        run: |
          sudo wineboot --init

      - name: Test
        run: |
          sudo ./xtest.py --branch ${{ inputs.branch }} --profile ${{ inputs.profile }} --verbose
