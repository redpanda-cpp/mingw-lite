name: Build single

on:
  workflow_call:
    inputs:
      build_arch:
        required: true
        type: string
      runner:
        required: true
        type: string
      profile:
        required: true
        type: string
      branch:
        required: true
        type: string
      enable_shared:
        required: true
        type: boolean
      upload_prefix:
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: src-${{ inputs.branch }}
          path: assets

      - uses: actions/download-artifact@v4
        with:
          name: buildenv-${{ inputs.build_arch }}
          path: assets

      - name: Build
        run: |
          zstdcat assets/buildenv.tar.zst | podman load
          podman run --rm --cap-add=sys_admin -v $PWD:/mnt -w /mnt mingw-lite/buildenv \
            ./main.py --branch ${{ inputs.branch }} --profile ${{ inputs.profile }} ${{ inputs.enable_shared && '--enable-shared' || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.upload_prefix }}mingw${{ inputs.profile }}-${{ inputs.branch }}
          path: dist

  test_on_linux:
    name: Test on Linux
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Enable multiarch
        run: |
          sudo dpkg --add-architecture i386

      - uses: ConorMacBride/install-package@v1
        with:
          apt: libarchive-tools wine

      # apt install wine-binfmt seems not work
      - name: Register wine binfmt
        run: |
          echo ':DOSWin:M::MZ::/usr/bin/wine:' | sudo tee /proc/sys/fs/binfmt_misc/register

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.upload_prefix }}mingw${{ inputs.profile }}-${{ inputs.branch }}
          path: dist

      - name: Test
        run: |
          ./test.py --branch ${{ inputs.branch }} --profile ${{ inputs.profile }} --verbose ${{ inputs.enable_shared && '--enable-shared' || '' }}

  test_on_windows:
    name: Test on Windows
    needs: build
    strategy:
      fail-fast: false
      matrix:
        runner:
          - windows-2025
          - windows-2022
          - windows-11-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.upload_prefix }}mingw${{ inputs.profile }}-${{ inputs.branch }}
          path: dist

      - uses: ./.github/setup-bsdtar

      - name: Install Python Package
        run: |
          pip install packaging

      - name: Test
        run: |
          python test.py --branch ${{ inputs.branch }} --profile ${{ inputs.profile }} --build x86_64-w64-mingw32 --verbose ${{ inputs.enable_shared && '--enable-shared' || '' }}
